name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Persist QRZ lookups between runs so we only query newly added callsigns.
      - name: Restore QRZ cache
        uses: actions/cache@v4
        with:
          path: data/qrz_cache.json
          key: qrz-cache-${{ hashFiles('members.txt') }}
          restore-keys: |
            qrz-cache-

      # Check every member callsign against QRZ (live, bypasses the cache)
      # and rewrite members.txt / qrqcrew-notes.txt when calls have changed.
      # continue-on-error keeps a QRZ outage from blocking the deploy.
      - name: Update changed callsigns from QRZ
        continue-on-error: true
        env:
          QRZ_USERNAME: ${{ secrets.QRZ_USERNAME }}
          QRZ_PASSWORD: ${{ secrets.QRZ_PASSWORD }}
        run: python3 scripts/update-callsigns.py --apply

      - name: Commit callsign updates
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- members.txt qrqcrew-notes.txt; then
            echo "No callsign changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add members.txt qrqcrew-notes.txt
          git commit -m "Update member callsigns from QRZ"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)

      # QRZ credentials let the roster follow callsign changes (old -> new).
      - name: Build roster page
        env:
          QRZ_USERNAME: ${{ secrets.QRZ_USERNAME }}
          QRZ_PASSWORD: ${{ secrets.QRZ_PASSWORD }}
        run: python3 scripts/build-roster.py

      - name: Build crew map data
        env:
          QRZ_USERNAME: ${{ secrets.QRZ_USERNAME }}
          QRZ_PASSWORD: ${{ secrets.QRZ_PASSWORD }}
        run: python3 scripts/build-map.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
